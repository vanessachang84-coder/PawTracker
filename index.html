<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7C9E8A">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawTracker — 寵物健康管家</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:#FAF7F2; --white:#FFFDF9; --ink:#1C1917; --ink-light:#57534E;
      --ink-muted:#A8A29E; --sage:#7C9E8A; --sage-light:#EDF3EF;
      --amber:#D97706; --amber-light:#FEF3C7; --rose:#BE6B72; --rose-light:#FEF2F2;
      --border:#E7E2DA; --top-h:60px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: 'DM Sans', 'Noto Sans TC', sans-serif; 
      background: var(--cream); color: var(--ink); line-height: 1.5; 
    }
    header {
      height: var(--top-h); background: var(--white);
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .brand { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--sage); }
    main { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
    .pet-card {
      background: var(--white); border-radius: 20px; padding: 20px;
      margin-bottom: 16px; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; position: relative;
    }
    .pet-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--sage-light); font-size: 30px; display: flex; align-items: center; justify-content: center; }
    .pet-info h3 { margin: 0; font-size: 18px; }
    .pet-info p { margin: 4px 0 0; color: var(--ink-light); font-size: 14px; }
    .delete-btn {
      position: absolute; right: 15px; top: 15px;
      background: var(--rose-light); color: var(--rose);
      border: none; padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
    }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px;
    }
    .modal-content { background: var(--white); padding: 25px; border-radius: 25px; width: 100%; max-width: 350px; }
    input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; margin: 10px 0; }
    .avatar-picker { display: flex; gap: 10px; margin: 15px 0; justify-content: space-around; }
    .avatar-option { 
      width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer;
      transition: all 0.2s;
    }
    .avatar-option.selected { border-color: var(--amber); background: var(--amber-light); transform: scale(1.1); }
    .btn-primary { width: 100%; background: var(--sage); color: white; border: none; padding: 15px; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-text { width: 100%; background: none; border: none; color: var(--ink-muted); margin-top: 10px; cursor: pointer; }
    .fab {
      position: fixed; bottom: 30px; right: 20px;
      width: 60px; height: 60px; background: var(--sage); color: white;
      border-radius: 30px; display: flex; align-items: center; justify-content: center;
      font-size: 30px; box-shadow: 0 4px 15px rgba(124, 158, 138, 0.4); z-index: 90;
    }
  </style>
</head>
<body>

<header><div class="brand">PawTracker</div></header>

<main id="pet-list"></main>

<div class="fab" onclick="showModal()">＋</div>

<div id="petModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0">新增成員</h3>
    <input type="text" id="petName" placeholder="輸入寵物名字">
    <div class="avatar-picker">
      <div class="avatar-option selected" onclick="selectAvatar(this, '🐶')">🐶</div>
      <div class="avatar-option" onclick="selectAvatar(this, '🐱')">🐱</div>
      <div class="avatar-option" onclick="selectAvatar(this, '🐰')">🐰</div>
      <div class="avatar-option" onclick="selectAvatar(this, '🐹')">🐹</div>
    </div>
    <button class="btn-primary" onclick="addPet()">確認加入</button>
    <button class="btn-text" onclick="hideModal()">取消</button>
  </div>
</div>

<script>
  let pets = JSON.parse(localStorage.getItem('pets')) || [
    { id: 1, name: '小乖 (範例)', avatar: '🐶' }
  ];
  let selectedAvatar = '🐶';

  function renderPets() {
    const list = document.getElementById('pet-list');
    if (pets.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:#A8A29E; margin-top:50px;">還沒有成員喔，點擊右下角新增</div>';
      return;
    }
    list.innerHTML = pets.map(pet => `
      <div class="pet-card">
        <div class="pet-avatar">${pet.avatar}</div>
        <div class="pet-info"><h3>${pet.name}</h3><p>家庭成員</p></div>
        <button class="delete-btn" onclick="deletePet(${pet.id})">刪除</button>
      </div>
    `).join('');
  }

  function showModal() { document.getElementById('petModal').style.display = 'flex'; }
  function hideModal() { document.getElementById('petModal').style.display = 'none'; }

  function selectAvatar(el, icon) {
    document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = icon;
  }

  function addPet() {
    const name = document.getElementById('petName').value;
    if (!name) return;
    pets.push({ id: Date.now(), name: name, avatar: selectedAvatar });
    save();
    hideModal();
    document.getElementById('petName').value = '';
  }

  function deletePet(id) {
    if (confirm('確定移除？')) {
      pets = pets.filter(p => p.id !== id);
      save();
    }
  }

  function save() {
    localStorage.setItem('pets', JSON.stringify(pets));
    renderPets();
  }

  renderPets();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
