<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7C9E8A">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawTracker — 寵物健康管家</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:#FAF7F2; --white:#FFFDF9; --ink:#1C1917; --ink-light:#57534E;
      --ink-muted:#A8A29E; --sage:#7C9E8A; --sage-light:#EDF3EF;
      --amber:#D97706; --amber-light:#FEF3C7; --rose:#BE6B72; --rose-light:#FEF2F2;
      --sky:#4A90B8; --sky-light:#EFF6FF; --border:#E7E2DA;
      --nav-h:64px; --top-h:52px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: 'DM Sans', 'Noto Sans TC', sans-serif; 
      background: var(--cream); color: var(--ink); 
      line-height: 1.5; overflow-x: hidden;
    }

    /* 頂部導覽列 */
    header {
      height: var(--top-h); background: var(--white);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .brand { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--sage); }
    
    /* 主內容區 */
    main { padding: 20px 20px 100px; max-width: 600px; margin: 0 auto; }

    /* 寵物清單卡片 */
    .pet-card {
      background: var(--white); border-radius: 20px; padding: 20px;
      margin-bottom: 16px; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      position: relative; transition: transform 0.2s;
    }
    .pet-card.active { border: 2px solid var(--sage); background: var(--sage-light); }
    .pet-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--sage-light); font-size: 32px; display: flex; align-items: center; justify-content: center; }
    .pet-info h3 { margin: 0; font-size: 18px; }
    .pet-info p { margin: 4px 0 0; color: var(--ink-light); font-size: 14px; }
    
    .delete-btn {
      position: absolute; right: 16px; top: 16px;
      background: var(--rose-light); color: var(--rose);
      border: none; padding: 4px 8px; border-radius: 8px; font-size: 12px; cursor: pointer;
    }

    /* 新增寵物表單 */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px;
    }
    .modal-content { background: var(--white); padding: 24px; border-radius: 24px; width: 100%; max-width: 400px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; }
    
    /* 頭像選擇器 */
    .avatar-picker { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .avatar-option { 
      width: 48px; height: 48px; border-radius: 50%; border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer;
      background: var(--cream);
    }
    .avatar-option.selected { border-color: var(--sage); background: var(--sage-light); }

    .btn-primary { 
      width: 100%; background: var(--sage); color: white; border: none; 
      padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600; margin-top: 12px;
    }
    .btn-text { width: 100%; background: none; border: none; color: var(--ink-muted); margin-top: 12px; }

    /* 浮動按鈕 */
    .fab {
      position: fixed; bottom: 30px; right: 20px;
      width: 56px; height: 56px; background: var(--sage); color: white;
      border-radius: 28px; display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 4px 12px rgba(124, 158, 138, 0.3); z-index: 90;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">PawTracker</div>
</header>

<main id="app">
  <section id="pet-list">
    </section>
</main>

<div class="fab" onclick="showModal()">＋</div>

<div id="petModal" class="modal">
  <div class="modal-content">
    <h3>新增寵物成員</h3>
    <div class="form-group">
      <label>名字</label>
      <input type="text" id="petName" placeholder="例如：狗狗名稱">
    </div>
    <div class="form-group">
      <label>選擇頭像</label>
      <div class="avatar-picker" id="avatarPicker">
        <div class="avatar-option selected" onclick="selectAvatar(this, '🐶')">🐶</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐱')">🐱</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐰')">🐰</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐹')">🐹</div>
        <div class="avatar-option" onclick="selectAvatar(this, '🐦')">🐦</div>
      </div>
    </div>
    <button class="btn-primary" onclick="addPet()">加入家庭</button>
    <button class="btn-text" onclick="hideModal()">取消</button>
  </div>
</div>

<script>
  let pets = JSON.parse(localStorage.getItem('pets')) || [
    { id: 1, name: '小乖 (範例)', avatar: '🐶', breed: '預設成員' }
  ];
  let selectedAvatar = '🐶';

  // 渲染寵物清單
  function renderPets() {
    const list = document.getElementById('pet-list');
    if (pets.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:var(--ink-muted); margin-top:40px;">目前沒有寵物，請按右下角新增</div>';
      return;
    }
    list.innerHTML = pets.map(pet => `
      <div class="pet-card">
        <div class="pet-avatar">${pet.avatar}</div>
        <div class="pet-info">
          <h3>${pet.name}</h3>
          <p>${pet.breed || '家庭成員'}</p>
        </div>
        <button class="delete-btn" onclick="deletePet(${pet.id})">刪除</button>
      </div>
    `).join('');
  }

  // 顯示/隱藏 Modal
  function showModal() { document.getElementById('petModal').style.display = 'flex'; }
  function hideModal() { document.getElementById('petModal').style.display = 'none'; }

  // 選擇頭像邏輯
  function selectAvatar(el, icon) {
    document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = icon;
  }

  // 新增寵物
  function addPet() {
    const name = document.getElementById('petName').value;
    if (!name) return alert('請輸入名字');
    
    const newPet = {
      id: Date.now(),
      name: name,
      avatar: selectedAvatar,
      breed: '家庭成員'
    };
    
    pets.push(newPet);
    saveAndRefresh();
    hideModal();
    document.getElementById('petName').value = '';
  }

  // 刪除寵物 (修正點：現在可以刪除任何寵物)
  function deletePet(id) {
    if (confirm('確定要移除這位成員嗎？')) {
      pets = pets.filter(p => p.id !== id);
      saveAndRefresh();
    }
  }

  function saveAndRefresh() {
    localStorage.setItem('pets', JSON.stringify(pets));
    renderPets();
  }

  // 初始化
  renderPets();

  // 註冊 Service Worker (PWA 核心)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('SW 註冊成功');
      }).catch(err => {
        console.log('SW 註冊失敗', err);
      });
    });
  }
</script>

</body>
</html>
